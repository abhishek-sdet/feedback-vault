name: Supabase Keep-Alive

on:
  schedule:
    # Run 3× per week — Supabase free tier pauses after 7 days of inactivity.
    # Mon 02:00 UTC, Wed 02:00 UTC, Fri 02:00 UTC
    - cron: '0 2 * * 1'
    - cron: '0 2 * * 3'
    - cron: '0 2 * * 5'
  workflow_dispatch: # Allow manual trigger at any time

jobs:
  ping:
    name: Heartbeat ping
    runs-on: ubuntu-latest
    # Safety net: even if the script somehow exits non-zero, CI stays green.
    # The script itself already exits 0 in all cases, so this is belt-and-suspenders.
    continue-on-error: true
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run keep-alive script
        continue-on-error: true   # belt-and-suspenders at step level too
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: node scripts/keep-alive.js

      - name: Trigger HTTP heartbeat
        continue-on-error: true
        env:
          DEPLOYMENT_URL: ${{ secrets.DEPLOYMENT_URL }}
        run: |
          if [ -n "$DEPLOYMENT_URL" ]; then
            echo "Triggering HTTP heartbeat to $DEPLOYMENT_URL/api/test"
            curl --max-time 30 --retry 3 --retry-delay 5 -f "$DEPLOYMENT_URL/api/test" \
              || echo "HTTP Heartbeat failed — continuing anyway."
          else
            echo "DEPLOYMENT_URL not set, skipping HTTP heartbeat."
          fi
