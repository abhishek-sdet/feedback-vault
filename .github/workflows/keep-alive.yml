name: Supabase Keep-Alive

on:
  schedule:
    # Run every Sunday at UTC 00:00
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run keep-alive script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: node scripts/keep-alive.js

      - name: Trigger HTTP heartbeat
        env:
          DEPLOYMENT_URL: ${{ secrets.DEPLOYMENT_URL }}
        run: |
          if [ -n "$DEPLOYMENT_URL" ]; then
            echo "Triggering HTTP heartbeat to $DEPLOYMENT_URL/api/test"
            curl -f "$DEPLOYMENT_URL/api/test" || echo "HTTP Heartbeat failed, but continuing..."
          else
            echo "DEPLOYMENT_URL not set, skipping HTTP heartbeat."
          fi
